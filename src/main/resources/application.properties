spring.application.name=job-portal-api
spring.datasource.url=${DB_URL:jdbc:h2:mem:jobportal;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.h2.console.enabled=true

server.port=${PORT:8081}

app.jwt.secret=${JWT_SECRET:change-this-development-secret-to-a-long-random-production-secret}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}

springdoc.swagger-ui.path=/swagger-ui.html
